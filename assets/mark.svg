<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Ready Agent 1 mark">
  <title>Ready Agent 1</title>
  <defs>
    <linearGradient id="hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DE2E6"/>
      <stop offset="1" stop-color="#FF3CAC"/>
    </linearGradient>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- void + neon frame -->
  <rect x="4" y="4" width="248" height="248" rx="40" fill="#0B0A1E"/>
  <rect x="4" y="4" width="248" height="248" rx="40" fill="none" stroke="#FF3CAC" stroke-width="3" opacity="0.8" filter="url(#g)"/>

  <!-- grid hint -->
  <g stroke="#2DE2E6" stroke-width="1.2" opacity="0.3">
    <line x1="16" y1="206" x2="240" y2="206"/>
    <line x1="16" y1="222" x2="240" y2="222"/>
    <line x1="16" y1="240" x2="240" y2="240"/>
  </g>

  <!-- hex badge + chrome 1 -->
  <polygon points="128,50 185,83 185,149 128,182 71,149 71,83" fill="#240A47" opacity="0.6"/>
  <polygon points="128,50 185,83 185,149 128,182 71,149 71,83" fill="none" stroke="url(#hex)" stroke-width="4.5" filter="url(#g)"/>
  <text x="128" y="150" text-anchor="middle" font-family="Orbitron, Eurostile, 'Arial Black', sans-serif" font-size="92" font-weight="800" fill="#EAF6FF" filter="url(#g)">1</text>
  <text x="128" y="232" text-anchor="middle" font-family="Share Tech Mono, JetBrains Mono, monospace" font-size="13" letter-spacing="4" fill="#2DE2E6">READY AGENT</text>
</svg>
