<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="Ready Agent 1 — is your codebase ready for the agents?">
  <title>Ready Agent 1</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0A1E"/>
      <stop offset="0.55" stop-color="#240A47"/>
      <stop offset="1" stop-color="#4A0E6B"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD36E"/>
      <stop offset="0.55" stop-color="#FF6AC1"/>
      <stop offset="1" stop-color="#FF3CAC"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DE2E6"/>
      <stop offset="0.5" stop-color="#FF6AC1"/>
      <stop offset="1" stop-color="#FF3CAC"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="sunmask">
      <rect x="470" y="80" width="260" height="270" fill="#fff"/>
      <rect x="470" y="214" width="260" height="4" fill="#000"/>
      <rect x="470" y="225" width="260" height="5" fill="#000"/>
      <rect x="470" y="238" width="260" height="6" fill="#000"/>
      <rect x="470" y="255" width="260" height="8" fill="#000"/>
      <rect x="470" y="276" width="260" height="9" fill="#000"/>
      <rect x="470" y="301" width="260" height="11" fill="#000"/>
    </mask>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#EAF6FF" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- void -->
  <rect width="1200" height="400" fill="url(#sky)"/>

  <!-- synth sun -->
  <circle cx="600" cy="210" r="125" fill="url(#sun)" mask="url(#sunmask)" filter="url(#softglow)"/>

  <!-- horizon -->
  <rect x="0" y="249" width="1200" height="2" fill="#2DE2E6" filter="url(#glow)" opacity="0.9"/>

  <!-- neon grid floor -->
  <g stroke="#2DE2E6" stroke-width="1.4" opacity="0.55">
    <line x1="600" y1="251" x2="-220" y2="400"/>
    <line x1="600" y1="251" x2="-20" y2="400"/>
    <line x1="600" y1="251" x2="180" y2="400"/>
    <line x1="600" y1="251" x2="340" y2="400"/>
    <line x1="600" y1="251" x2="470" y2="400"/>
    <line x1="600" y1="251" x2="600" y2="400"/>
    <line x1="600" y1="251" x2="730" y2="400"/>
    <line x1="600" y1="251" x2="860" y2="400"/>
    <line x1="600" y1="251" x2="1020" y2="400"/>
    <line x1="600" y1="251" x2="1220" y2="400"/>
    <line x1="600" y1="251" x2="1420" y2="400"/>
  </g>
  <g stroke="#2DE2E6" stroke-width="1.4">
    <line x1="0" y1="258" x2="1200" y2="258" opacity="0.25"/>
    <line x1="0" y1="270" x2="1200" y2="270" opacity="0.35"/>
    <line x1="0" y1="288" x2="1200" y2="288" opacity="0.45"/>
    <line x1="0" y1="312" x2="1200" y2="312" opacity="0.55"/>
    <line x1="0" y1="344" x2="1200" y2="344" opacity="0.7"/>
    <line x1="0" y1="384" x2="1200" y2="384" opacity="0.85"/>
  </g>

  <!-- HUD corners -->
  <text x="40" y="56" font-family="Share Tech Mono, JetBrains Mono, monospace" font-size="18" fill="#2DE2E6" opacity="0.85">▮ INSERT COIN</text>
  <text x="1160" y="56" text-anchor="end" font-family="Share Tech Mono, JetBrains Mono, monospace" font-size="18" fill="#FFD36E" opacity="0.9">HI-SCORE  L3/5</text>

  <!-- subtitle -->
  <text x="600" y="78" text-anchor="middle" font-family="Share Tech Mono, JetBrains Mono, monospace" font-size="21" letter-spacing="5" fill="#2DE2E6">IS YOUR CODEBASE READY FOR THE AGENTS?</text>

  <!-- wordmark -->
  <text x="600" y="188" text-anchor="middle" font-family="Orbitron, Eurostile, 'Arial Black', sans-serif" font-size="76" font-weight="800" letter-spacing="7" fill="url(#neon)" filter="url(#glow)">READY AGENT 1</text>

  <!-- level select -->
  <text x="884" y="318" text-anchor="middle" font-family="Share Tech Mono, JetBrains Mono, monospace" font-size="13" letter-spacing="4" fill="#EAF6FF" opacity="0.8">— LEVEL SELECT —</text>
  <g font-family="Orbitron, Eurostile, 'Arial Black', sans-serif" font-size="22" font-weight="800" text-anchor="middle">
    <g filter="url(#glow)">
      <circle cx="772" cy="348" r="17" fill="#FF3CAC"/>
      <circle cx="828" cy="348" r="17" fill="#FF3CAC"/>
      <circle cx="884" cy="348" r="17" fill="#FF3CAC"/>
    </g>
    <circle cx="940" cy="348" r="17" fill="none" stroke="#2DE2E6" stroke-width="2" opacity="0.7"/>
    <circle cx="996" cy="348" r="17" fill="none" stroke="#2DE2E6" stroke-width="2" opacity="0.7"/>
    <text x="772" y="356" fill="#0B0A1E">1</text>
    <text x="828" y="356" fill="#0B0A1E">2</text>
    <text x="884" y="356" fill="#0B0A1E">3</text>
    <text x="940" y="356" fill="#2DE2E6">4</text>
    <text x="996" y="356" fill="#2DE2E6">5</text>
  </g>

  <!-- footer -->
  <text x="600" y="390" text-anchor="middle" font-family="Share Tech Mono, JetBrains Mono, monospace" font-size="14" fill="#EAF6FF" opacity="0.7">deterministic · cited · clear-to-merge</text>

  <!-- scanlines -->
  <rect width="1200" height="400" fill="url(#scan)"/>
</svg>
