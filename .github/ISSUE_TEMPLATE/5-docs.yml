name: Documentation
description: Wrong, unclear, or missing documentation
title: "[docs]: "
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Location
      description: File and section, e.g. `docs/extending.md — Adding a criterion`.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What's wrong or missing
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
    validations:
      required: false
