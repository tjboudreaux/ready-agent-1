name: Feature request
description: New capability for the engine, CLI, skills, or CI action
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Proposing a new readiness *criterion*? Use the "New criterion proposal" template instead.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What you're trying to do and what's missing.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
