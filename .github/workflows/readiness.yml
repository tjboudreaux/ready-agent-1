name: Agent Readiness

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write   # upload SARIF to code scanning
  actions: read            # upload-sarif + T2 workflow checks need workflow-run reads
  pull-requests: write

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Dogfood the action from main; the user-facing template pins @v1.
      - uses: tjboudreaux/ready-agent-1/ci@main
        with:
          min-level: "3"
          formats: "markdown,junit,sarif,github"
        env:
          GH_TOKEN: ${{ github.token }}
